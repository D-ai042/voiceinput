<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>VoiceInput</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: rgba(30, 30, 30, 0.92);
      width: 120px;
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      -webkit-app-region: drag;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      overflow: hidden;
    }

    /* ====== 顶部工具栏 ====== */
    .toolbar {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
      width: 100%;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    .toolbar button {
      padding: 2px 6px;
      font-size: 10px;
      background: rgba(60, 60, 60, 1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 0.15s, color 0.15s;
      line-height: 1.4;
    }

    .toolbar button:hover {
      background: rgba(80, 80, 80, 1);
      color: #fff;
    }

    .toolbar button:active {
      background: rgba(100, 100, 100, 1);
    }

    /* ====== 麦克风按钮 ====== */
    .mic-area {
      position: relative;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 4px 0;
    }

    #mic-button {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(70, 70, 70, 1);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.25s;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    #mic-button:hover {
      background: rgba(90, 90, 90, 1);
      border-color: rgba(255, 255, 255, 0.35);
    }

    #mic-button:active {
      transform: scale(0.93);
    }

    /* 录音状态 */
    #mic-button.recording {
      background: #d32f2f;
      border-color: #ff5252;
      box-shadow: 0 0 16px rgba(211, 47, 47, 0.6);
      animation: mic-pulse 1s ease-in-out infinite;
    }

    #mic-button.processing {
      background: #f57c00;
      border-color: #ffab40;
    }

    #mic-button.success {
      background: #388e3c;
      border-color: #69f0ae;
    }

    #mic-button.error {
      background: #b71c1c;
      border-color: #ff1744;
    }

    @keyframes mic-pulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 16px rgba(211, 47, 47, 0.6);
      }

      50% {
        transform: scale(1.06);
        box-shadow: 0 0 28px rgba(211, 47, 47, 0.9);
      }
    }

    /* ====== 脉冲环 ====== */
    #pulse-ring {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255, 82, 82, 0.4);
      top: 0;
      left: 0;
      pointer-events: none;
      opacity: 0;
    }

    #pulse-ring.active {
      opacity: 1;
      animation: pulse-ring 1.5s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.9);
        opacity: 0.8;
      }

      100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }

    /* ====== 声波动画 ====== */
    #wave-bars {
      display: flex;
      gap: 3px;
      align-items: center;
      height: 18px;
      margin-top: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #wave-bars.active {
      opacity: 1;
    }

    #wave-bars span {
      display: block;
      width: 3px;
      background: #ff5252;
      border-radius: 2px;
      animation: wave 0.5s ease-in-out infinite alternate;
    }

    #wave-bars span:nth-child(1) {
      height: 6px;
      animation-delay: 0s;
    }

    #wave-bars span:nth-child(2) {
      height: 10px;
      animation-delay: 0.15s;
    }

    #wave-bars span:nth-child(3) {
      height: 14px;
      animation-delay: 0.3s;
    }

    #wave-bars span:nth-child(4) {
      height: 10px;
      animation-delay: 0.15s;
    }

    #wave-bars span:nth-child(5) {
      height: 6px;
      animation-delay: 0s;
    }

    @keyframes wave {
      0% {
        transform: scaleY(0.3);
      }

      100% {
        transform: scaleY(1);
      }
    }

    /* ====== 状态文字 ====== */
    #status-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 10px;
      line-height: 1.3;
      margin-top: 2px;
      -webkit-app-region: no-drag;
      text-align: center;
    }

    #status-text.recording {
      color: #ff5252;
    }

    #status-text.processing {
      color: #ffab40;
    }

    /* ====== 计时器 ====== */
    #timer-text {
      color: rgba(255, 255, 255, 0.3);
      font-size: 9px;
      font-family: monospace;
      line-height: 1.2;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #timer-text.active {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button id="btn-settings">⚙</button>
    <button id="btn-mode">流式</button>
    <button id="btn-quit">✖</button>
  </div>

  <div class="mic-area">
    <div id="pulse-ring"></div>
    <button id="mic-button">🎤</button>
  </div>

  <div id="wave-bars">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div id="status-text">等待</div>
  <div id="timer-text">00:00</div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const api = window.electronAPI;
      const statusEl = document.getElementById('status-text');
      const modeBtn = document.getElementById('btn-mode');

      if (!api) {
        statusEl.textContent = '❌ API 未加载';
        return;
      }

      statusEl.textContent = '✅ 就绪';

      // ========== 按钮点击 ==========
      document.getElementById('btn-settings').onclick = () => api.openSettings();
      document.getElementById('btn-quit').onclick = () => api.quitApp();

      document.getElementById('mic-button').onclick = () => {
        api.toggleRecording();
      };

      let isStreamMode = true;
      modeBtn.onclick = () => {
        isStreamMode = !isStreamMode;
        const mode = isStreamMode ? 'baidu_stream' : 'baidu_normal';
        api.setMode(mode);
        modeBtn.textContent = isStreamMode ? '流式' : '标准';
        statusEl.textContent = '已切换' + (isStreamMode ? '流式' : '标准');
        setTimeout(() => { statusEl.textContent = '✅ 就绪'; }, 1000);
      };

      // ========== 注册 IPC 监听器 ==========
      // 这些是核心：把主进程发来的消息连接到 preload 的 UI 更新函数
      api.onUpdateIcon((icon) => api.updateIcon(icon));
      api.onUpdateStatus((text) => api.updateStatus(text));
      api.onStartBreathing(() => api.startBreathing());
      api.onStopBreathing(() => api.stopBreathing());
      api.onResetUI(() => api.resetUI());
      api.onNotify((msg) => statusEl.textContent = msg);

      // 非流式录音（标准模式）：开始/停止 → preload 负责采集 → 返回音频路径
      api.onStartRecording(async () => {
        const ok = await api.startAudioRecording();
        api.sendRecordingStarted(ok);
      });
      api.onStopRecording(async () => {
        const path = await api.stopAudioRecording();
        if (path) api.sendRecordingComplete(path);
      });

      // 流式录音：开始/停止 PCM 采集
      api.onStartStreamRecording(() => api.startStreamAudioRecording());
      api.onStopStreamRecording(() => api.stopStreamAudioRecording());

      // 显示流式识别中间结果
      api.onStreamResult((text) => {
        const short = text.length > 18 ? text.substring(0, 18) + '…' : text;
        statusEl.textContent = '🎤 ' + short;
      });
    });
  </script>
</body>

</html>
